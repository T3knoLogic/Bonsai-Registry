# Full Bonsai Registry pipeline: sync → deep-dive → update-export → news
# Runs every 4 hours; commits export, extended, and news files
name: Registry Pipeline

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:  # Manual trigger

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run full pipeline
        run: npm run pipeline

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bonsai-registry-news.json bonsai-registry-export-*.json bonsai-registry-extended.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: pipeline update — export, extended, news [automated]"
            git push
          fi
